<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SocialAlpha — Social Media Platform</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a1a;min-height:100vh}
nav{background:#1877f2;color:#fff;padding:.8rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px #0002}
.logo{font-weight:800;font-size:1.2rem;letter-spacing:-.5px}
.nav-links{display:flex;gap:.5rem;align-items:center}
nav button{background:none;border:none;color:#ffffffcc;cursor:pointer;font-size:.9rem;padding:.4rem .9rem;border-radius:8px;font-family:inherit;transition:background .15s}
nav button:hover{background:#ffffff20;color:#fff}
.btn-light{background:#fff !important;color:#1877f2 !important;font-weight:600}
.btn-light:hover{background:#f0f2f5 !important}
.layout{max-width:900px;margin:0 auto;padding:1.5rem;display:grid;grid-template-columns:240px 1fr;gap:1.5rem}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}}
.sidebar{display:flex;flex-direction:column;gap:1rem}
.sidebar-card{background:#fff;border-radius:12px;padding:1.2rem;box-shadow:0 1px 4px #0001}
.sidebar-card h3{font-size:.95rem;font-weight:700;margin-bottom:.8rem;color:#444}
.sidebar-user{display:flex;align-items:center;gap:.7rem;margin-bottom:.5rem;cursor:pointer}
.avatar{width:36px;height:36px;border-radius:50%;background:#1877f220;color:#1877f2;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;flex-shrink:0}
.sidebar-username{font-weight:600;font-size:.9rem}
.main{display:flex;flex-direction:column;gap:1rem}
.card{background:#fff;border-radius:12px;padding:1.2rem;box-shadow:0 1px 4px #0001}
.compose{width:100%;border:none;border-radius:20px;background:#f0f2f5;padding:.8rem 1.2rem;font-size:.95rem;font-family:inherit;resize:none;outline:none;min-height:60px}
.compose-footer{display:flex;justify-content:flex-end;margin-top:.8rem}
.btn{padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-size:.9rem;font-weight:600;font-family:inherit;transition:all .15s}
.btn-primary{background:#1877f2;color:#fff}
.btn-primary:hover{background:#1563cc}
.btn-outline{background:#fff;border:1.5px solid #1877f2;color:#1877f2}
.btn-sm{padding:.3rem .8rem;font-size:.82rem;border-radius:6px}
.btn-danger{background:#ef4444;color:#fff}
.post{border-bottom:1px solid #f0f2f5;padding-bottom:1rem;margin-bottom:1rem}
.post:last-child{border-bottom:none;margin-bottom:0}
.post-header{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem}
.post-meta{flex:1}
.post-author{font-weight:700;font-size:.95rem;cursor:pointer;color:#1877f2}
.post-author:hover{text-decoration:underline}
.post-time{font-size:.8rem;color:#888}
.post-content{font-size:.95rem;line-height:1.55;margin-bottom:.8rem;white-space:pre-wrap}
.post-actions{display:flex;gap:.5rem;align-items:center}
.action-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .9rem;border-radius:6px;border:none;background:none;cursor:pointer;color:#65676b;font-size:.88rem;font-weight:600;transition:background .15s;font-family:inherit}
.action-btn:hover{background:#f0f2f5}
.action-btn.liked{color:#1877f2}
.comments-section{margin-top:.8rem;border-top:1px solid #f0f2f5;padding-top:.8rem;display:none}
.comment{display:flex;gap:.6rem;margin-bottom:.6rem}
.comment-bubble{background:#f0f2f5;border-radius:12px;padding:.5rem .9rem;font-size:.88rem}
.comment-author{font-weight:600;margin-right:.3rem}
.comment-input-row{display:flex;gap:.6rem;margin-top:.5rem}
.comment-input{flex:1;border:none;background:#f0f2f5;border-radius:20px;padding:.5rem 1rem;font-size:.88rem;outline:none;font-family:inherit}
.modal-overlay{display:none;position:fixed;inset:0;background:#0008;z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:2rem;width:100%;max-width:400px;box-shadow:0 20px 60px #0003}
.tabs{display:flex;gap:.5rem;margin-bottom:1.2rem}
.tab{padding:.5rem 1.1rem;border-radius:8px;border:none;cursor:pointer;font-weight:600;background:#f0f2f5;color:#65676b;font-family:inherit}
.tab.active{background:#1877f2;color:#fff}
input{width:100%;padding:.6rem .9rem;border:1.5px solid #e0e0e0;border-radius:8px;font-size:.9rem;margin-bottom:.8rem;outline:none;font-family:inherit}
input:focus{border-color:#1877f2}
.alert{padding:.6rem 1rem;border-radius:8px;margin-bottom:.8rem;font-size:.88rem}
.alert-error{background:#fff5f5;color:#c0392b;border:1px solid #fdd}
.alert-success{background:#f0fff4;color:#27ae60;border:1px solid #bdf}
.profile-header{text-align:center;padding-bottom:1rem;border-bottom:1px solid #f0f2f5;margin-bottom:1rem}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:#1877f220;color:#1877f2;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto .7rem}
.stats{display:flex;gap:2rem;justify-content:center;margin:.7rem 0;font-size:.9rem}
.stat-num{font-weight:700;font-size:1.1rem;display:block}
.empty{text-align:center;color:#999;padding:2rem;font-size:.95rem}
</style>
</head>
<body>

<nav>
  <span class="logo">SocialAlpha</span>
  <div class="nav-links">
    <button onclick="showFeed()">Feed</button>
    <button onclick="showExplore()">Explore</button>
    <button id="auth-btn" class="btn-light" onclick="openAuth()">Login / Register</button>
    <button id="logout-btn" style="display:none" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-card" id="sidebar-profile" style="display:none">
      <h3>My Profile</h3>
      <div class="sidebar-user" onclick="showMyProfile()">
        <div class="avatar" id="sidebar-avatar"></div>
        <span class="sidebar-username" id="sidebar-username"></span>
      </div>
    </div>
    <div class="sidebar-card" id="sidebar-users">
      <h3>People</h3>
      <div id="user-list"></div>
    </div>
  </div>

  <div class="main" id="main-content">
    <div id="view-feed">
      <div class="card" id="compose-box" style="display:none">
        <textarea class="compose" id="compose-text" placeholder="What's on your mind?" rows="3"></textarea>
        <div class="compose-footer">
          <button class="btn btn-primary" onclick="createPost()">Post</button>
        </div>
      </div>
      <div id="feed-posts"></div>
    </div>
    <div id="view-profile" style="display:none">
      <div class="card">
        <div class="profile-header">
          <div class="profile-avatar" id="profile-avatar"></div>
          <div style="font-size:1.2rem;font-weight:700" id="profile-username"></div>
          <div class="stats">
            <div><span class="stat-num" id="profile-posts-count">0</span>Posts</div>
            <div><span class="stat-num" id="profile-followers">0</span>Followers</div>
            <div><span class="stat-num" id="profile-following">0</span>Following</div>
          </div>
          <button id="follow-btn" class="btn btn-primary btn-sm" style="display:none" onclick="toggleFollow()"></button>
        </div>
        <div id="profile-posts"></div>
      </div>
    </div>
  </div>
</div>

<div id="auth-modal" class="modal-overlay">
  <div class="modal">
    <div class="tabs">
      <button class="tab active" onclick="switchAuthTab('login')">Login</button>
      <button class="tab" onclick="switchAuthTab('register')">Register</button>
    </div>
    <div id="auth-alert"></div>
    <div id="login-form">
      <input id="l-email" type="email" placeholder="Email"/>
      <input id="l-pass" type="password" placeholder="Password"/>
      <button class="btn btn-primary" style="width:100%" onclick="login()">Login</button>
    </div>
    <div id="register-form" style="display:none">
      <input id="r-user" type="text" placeholder="Username"/>
      <input id="r-email" type="email" placeholder="Email"/>
      <input id="r-pass" type="password" placeholder="Password"/>
      <button class="btn btn-primary" style="width:100%" onclick="register()">Create Account</button>
    </div>
    <button onclick="closeAuth()" style="margin-top:.8rem;width:100%;background:#f0f2f5;border:none;padding:.6rem;border-radius:8px;cursor:pointer;color:#65676b;font-family:inherit">Cancel</button>
  </div>
</div>

<script>
const API = '/api';
let currentUser = null;
let viewingUserId = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  const data = await r.json().catch(() => ({}));
  return { ok: r.ok, data };
}

function esc(str) { return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(name) { return (name || '?')[0].toUpperCase(); }
function timeAgo(d) {
  const s = (Date.now() - new Date(d)) / 1000;
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function openAuth() { document.getElementById('auth-modal').classList.add('open'); }
function closeAuth() { document.getElementById('auth-modal').classList.remove('open'); }

function switchAuthTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('auth-alert').innerHTML = '';
}

function showAlert(id, msg, type = 'error') {
  document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${esc(msg)}</div>`;
}

async function checkAuth() {
  const { ok, data } = await api('GET', '/auth/me');
  if (ok) {
    currentUser = data;
    document.getElementById('auth-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = '';
    document.getElementById('compose-box').style.display = '';
    document.getElementById('sidebar-profile').style.display = '';
    document.getElementById('sidebar-avatar').textContent = initials(data.username);
    document.getElementById('sidebar-username').textContent = data.username;
  }
}

async function login() {
  const email = document.getElementById('l-email').value;
  const password = document.getElementById('l-pass').value;
  const { ok, data } = await api('POST', '/auth/login', { email, password });
  if (!ok) { showAlert('auth-alert', data.error); return; }
  closeAuth(); location.reload();
}

async function register() {
  const username = document.getElementById('r-user').value;
  const email = document.getElementById('r-email').value;
  const password = document.getElementById('r-pass').value;
  const { ok, data } = await api('POST', '/auth/register', { username, email, password });
  if (!ok) { showAlert('auth-alert', data.error); return; }
  closeAuth(); location.reload();
}

async function logout() { await api('POST', '/auth/logout'); location.reload(); }

async function showFeed() {
  document.getElementById('view-feed').style.display = '';
  document.getElementById('view-profile').style.display = 'none';
  loadFeed();
}

async function showExplore() {
  document.getElementById('view-feed').style.display = '';
  document.getElementById('view-profile').style.display = 'none';
  loadAllPosts();
}

async function loadFeed() {
  const container = document.getElementById('feed-posts');
  if (!currentUser) { loadAllPosts(); return; }
  const { ok, data } = await api('GET', '/feed');
  if (!ok) { container.innerHTML = '<div class="empty">Failed to load feed.</div>'; return; }
  renderPosts(data, container);
}

async function loadAllPosts() {
  const container = document.getElementById('feed-posts');
  const { ok, data } = await api('GET', '/posts');
  if (!ok || !data.length) { container.innerHTML = '<div class="empty card">No posts yet. Be the first to post!</div>'; return; }
  renderPosts(data, container);
}

function renderPosts(posts, container) {
  if (!posts.length) { container.innerHTML = '<div class="empty card">No posts yet.</div>'; return; }
  container.innerHTML = posts.map(p => `
    <div class="card" id="post-${p.id}">
      <div class="post">
        <div class="post-header">
          <div class="avatar">${initials(p.author?.username)}</div>
          <div class="post-meta">
            <div class="post-author" onclick="showProfile(${p.author?.id})">${esc(p.author?.username)}</div>
            <div class="post-time">${timeAgo(p.created_at)}</div>
          </div>
          ${currentUser && p.author?.id === currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">Delete</button>` : ''}
        </div>
        <div class="post-content">${esc(p.content)}</div>
        <div class="post-actions">
          <button class="action-btn ${p.liked ? 'liked' : ''}" id="like-btn-${p.id}" onclick="toggleLike(${p.id})">
            👍 <span id="like-count-${p.id}">${p.likeCount ?? 0}</span> Like
          </button>
          <button class="action-btn" onclick="toggleComments(${p.id})">
            💬 <span id="comment-count-${p.id}">${p.commentCount ?? 0}</span> Comment
          </button>
        </div>
        <div class="comments-section" id="comments-${p.id}">
          <div id="comment-list-${p.id}"></div>
          ${currentUser ? `
          <div class="comment-input-row">
            <input class="comment-input" id="comment-input-${p.id}" placeholder="Write a comment…" onkeydown="if(event.key==='Enter')submitComment(${p.id})"/>
            <button class="btn btn-primary btn-sm" onclick="submitComment(${p.id})">Post</button>
          </div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

async function createPost() {
  if (!currentUser) { openAuth(); return; }
  const content = document.getElementById('compose-text').value.trim();
  if (!content) return;
  const { ok } = await api('POST', '/posts', { content });
  if (!ok) return;
  document.getElementById('compose-text').value = '';
  loadFeed();
}

async function deletePost(id) {
  await api('DELETE', '/posts/' + id); loadFeed();
}

async function toggleLike(postId) {
  if (!currentUser) { openAuth(); return; }
  const { ok, data } = await api('POST', '/posts/' + postId + '/like');
  if (!ok) return;
  const btn = document.getElementById('like-btn-' + postId);
  const cnt = document.getElementById('like-count-' + postId);
  const current = parseInt(cnt.textContent);
  if (data.liked) { btn.classList.add('liked'); cnt.textContent = current + 1; }
  else { btn.classList.remove('liked'); cnt.textContent = Math.max(0, current - 1); }
}

async function toggleComments(postId) {
  const section = document.getElementById('comments-' + postId);
  const isOpen = section.style.display === 'block';
  section.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) loadComments(postId);
}

async function loadComments(postId) {
  const { ok, data } = await api('GET', '/posts/' + postId + '/comments');
  const list = document.getElementById('comment-list-' + postId);
  if (!ok || !data.length) { list.innerHTML = '<div style="color:#999;font-size:.85rem;margin-bottom:.5rem">No comments yet.</div>'; return; }
  list.innerHTML = data.map(c => `
    <div class="comment">
      <div class="avatar" style="width:28px;height:28px;font-size:.75rem">${initials(c.author?.username)}</div>
      <div class="comment-bubble"><span class="comment-author">${esc(c.author?.username)}</span>${esc(c.content)}</div>
    </div>
  `).join('');
}

async function submitComment(postId) {
  if (!currentUser) { openAuth(); return; }
  const input = document.getElementById('comment-input-' + postId);
  const content = input.value.trim();
  if (!content) return;
  const { ok } = await api('POST', '/posts/' + postId + '/comments', { content });
  if (!ok) return;
  input.value = '';
  loadComments(postId);
  const cnt = document.getElementById('comment-count-' + postId);
  cnt.textContent = parseInt(cnt.textContent) + 1;
}

async function loadUsers() {
  const { ok, data } = await api('GET', '/users');
  const list = document.getElementById('user-list');
  if (!ok || !data.length) { list.innerHTML = '<div style="color:#999;font-size:.85rem">No users yet.</div>'; return; }
  list.innerHTML = data.slice(0, 8).map(u => `
    <div class="sidebar-user" onclick="showProfile(${u.id})">
      <div class="avatar">${initials(u.username)}</div>
      <span class="sidebar-username">${esc(u.username)}</span>
    </div>
  `).join('');
}

async function showMyProfile() { if (currentUser) showProfile(currentUser.id); }

async function showProfile(userId) {
  viewingUserId = userId;
  document.getElementById('view-feed').style.display = 'none';
  document.getElementById('view-profile').style.display = '';
  const { ok, data } = await api('GET', '/users/' + userId + '/profile');
  if (!ok) return;
  document.getElementById('profile-avatar').textContent = initials(data.username);
  document.getElementById('profile-username').textContent = data.username;
  document.getElementById('profile-posts-count').textContent = data.posts.length;
  document.getElementById('profile-followers').textContent = data.followerCount;
  document.getElementById('profile-following').textContent = data.followingCount;
  const followBtn = document.getElementById('follow-btn');
  if (currentUser && currentUser.id !== userId) {
    followBtn.style.display = '';
    followBtn.textContent = data.isFollowing ? 'Unfollow' : 'Follow';
    followBtn.dataset.userId = userId;
  } else { followBtn.style.display = 'none'; }
  const postsEl = document.getElementById('profile-posts');
  if (!data.posts.length) { postsEl.innerHTML = '<div class="empty">No posts yet.</div>'; return; }
  postsEl.innerHTML = data.posts.map(p => `
    <div class="post">
      <div class="post-content" style="margin-bottom:.3rem">${esc(p.content)}</div>
      <div class="post-time" style="font-size:.8rem;color:#999">${timeAgo(p.created_at)}</div>
    </div>
  `).join('');
}

async function toggleFollow() {
  if (!currentUser) { openAuth(); return; }
  const uid = viewingUserId;
  const { ok, data } = await api('POST', '/users/' + uid + '/follow');
  if (!ok) return;
  document.getElementById('follow-btn').textContent = data.following ? 'Unfollow' : 'Follow';
  showProfile(uid);
}

checkAuth().then(() => { loadFeed(); loadUsers(); });
</script>
</body>
</html>
